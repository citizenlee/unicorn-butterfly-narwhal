<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unicorns, butterflies, and gems, oh my!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a0a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
    overflow: hidden;
  }
  canvas {
    border-radius: 16px;
    box-shadow: 0 0 40px rgba(200, 100, 255, 0.4);
    cursor: pointer;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = canvas.width = Math.min(800, window.innerWidth - 20);
const H = canvas.height = Math.min(600, window.innerHeight - 20);

// Ocean line
const OCEAN_Y = H * 0.85;
const OCEAN_BOTTOM = H;

// Game state
let gameState = 'title';
let score = 0;
let highScore = parseInt(localStorage.getItem('unicornHighScore') || '0');
let frameCount = 0;
let difficulty = 1;
let stars = [];
let sparkles = [];
let clouds = [];
let obstacles = [];
let rainbowTrail = [];
let screenShake = 0;
let oceanWaves = [];
let bgNarwhals = []; // decorative narwhals swimming in ocean
let bgButterflies = []; // decorative butterflies over ocean
let splashes = [];
let gems = [];
let gemsCollected = 0;
let playStartTime = 0;
let playSeconds = 0;
let obstaclesAvoided = 0;

// Generate stars (only in upper sky)
for (let i = 0; i < 60; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * OCEAN_Y * 0.5,
    size: Math.random() * 2 + 0.5,
    twinkle: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.3 + 0.1
  });
}

// Generate clouds
for (let i = 0; i < 5; i++) {
  clouds.push({
    x: Math.random() * W,
    y: Math.random() * OCEAN_Y * 0.4 + 30,
    width: Math.random() * 100 + 60,
    speed: Math.random() * 0.3 + 0.2,
    opacity: Math.random() * 0.15 + 0.08
  });
}

// Ocean wave points
for (let i = 0; i < 30; i++) {
  oceanWaves.push({
    phase: Math.random() * Math.PI * 2,
    amp: Math.random() * 4 + 2,
    speed: Math.random() * 0.02 + 0.02
  });
}

// Background decorative narwhals
function spawnBgNarwhal() {
  const jumping = Math.random() < 0.4;
  bgNarwhals.push({
    x: W + 60,
    y: jumping ? OCEAN_Y + 20 : OCEAN_Y + 20 + Math.random() * 40,
    speed: Math.random() * 1 + 0.8,
    jumping: jumping,
    jumpPhase: 0,
    jumpHeight: Math.random() * 60 + 40,
    baseY: OCEAN_Y + 20,
    winking: false,
    winkTimer: 0,
    paused: false,
    pauseTimer: 0,
    hasPaused: false,
    color: ['#6eb5ff', '#a0d2ff', '#87ceeb'][Math.floor(Math.random() * 3)],
    scale: Math.random() * 0.3 + 0.5
  });
}

// Background decorative butterflies
function spawnBgButterfly() {
  bgButterflies.push({
    x: W + 30,
    y: OCEAN_Y - Math.random() * 60 - 20,
    speed: Math.random() * 0.8 + 0.5,
    wobble: Math.random() * Math.PI * 2,
    wingOpen: Math.random() * Math.PI * 2,
    color: ['#ff69b4', '#dda0dd', '#ff6347', '#ffa500', '#9370db'][Math.floor(Math.random() * 5)],
    scale: Math.random() * 0.3 + 0.4
  });
}

// Initial bg elements
for (let i = 0; i < 3; i++) {
  const n = { x: Math.random() * W, y: OCEAN_Y + 20 + Math.random() * 30, speed: Math.random() * 1 + 0.5, jumping: false, jumpPhase: 0, jumpHeight: 50, baseY: OCEAN_Y + 20, winking: false, winkTimer: 0, paused: false, pauseTimer: 0, hasPaused: false, color: ['#6eb5ff', '#a0d2ff', '#87ceeb'][Math.floor(Math.random() * 3)], scale: Math.random() * 0.3 + 0.5 };
  bgNarwhals.push(n);
}
for (let i = 0; i < 4; i++) {
  const b = { x: Math.random() * W, y: OCEAN_Y - Math.random() * 50 - 20, speed: Math.random() * 0.6 + 0.3, wobble: Math.random() * Math.PI * 2, wingOpen: Math.random() * Math.PI * 2, color: ['#ff69b4', '#dda0dd', '#ffa500', '#9370db'][Math.floor(Math.random() * 4)], scale: Math.random() * 0.3 + 0.4 };
  bgButterflies.push(b);
}

// Unicorn (player)
const unicorn = {
  x: W * 0.2,
  y: H * 0.35,
  vy: 0,
  width: 70,
  height: 50,
  wingAngle: 0,
  wingSpeed: 0,
  flapPower: 0,
};

const GRAVITY = 0.18;
const FLAP_STRENGTH = -4.5;
const MAX_FALL_SPEED = 4.5;
const WING_DECAY = 0.95;

let spacePressed = false;
let mousePressed = false;
let holdingFly = false; // true when space or touch is held

function handleFlapStart() {
  if (gameState === 'title') {
    gameState = 'playing';
    score = 0;
    difficulty = 1;
    obstacles = [];
    gems = [];
    gemsCollected = 0;
    obstaclesAvoided = 0;
    playStartTime = Date.now();
    playSeconds = 0;
    rainbowTrail = [];
    sparkles = [];
    unicorn.y = H * 0.35;
    unicorn.vy = 0;
    unicorn.wingSpeed = 0;
    unicorn.flapPower = 0;
  }
  if (gameState === 'playing') {
    // Initial boost on press
    unicorn.vy = FLAP_STRENGTH;
    unicorn.wingSpeed = 12;
    holdingFly = true;
  }
  if (gameState === 'gameover') {
    gameState = 'title';
    unicorn.y = H * 0.35;
    unicorn.vy = 0;
    obstacles = [];
  }
}

function handleFlapEnd() {
  holdingFly = false;
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (!spacePressed) handleFlapStart();
    spacePressed = true;
  }
});
document.addEventListener('keyup', (e) => {
  if (e.code === 'Space') { spacePressed = false; handleFlapEnd(); }
});
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); mousePressed = true; handleFlapStart(); });
canvas.addEventListener('touchend', (e) => { mousePressed = false; handleFlapEnd(); });
canvas.addEventListener('mousedown', (e) => { e.preventDefault(); mousePressed = true; handleFlapStart(); });
canvas.addEventListener('mouseup', (e) => { mousePressed = false; handleFlapEnd(); });

// Spawn game obstacles
function spawnObstacle() {
  const type = Math.random() < 0.45 ? 'narwhal' : 'butterfly';
  const speed = (Math.random() * 1.5 + 2) * difficulty;

  if (type === 'narwhal') {
    // Narwhals jump out of the ocean!
    obstacles.push({
      type: 'narwhal',
      x: W + 80,
      baseY: OCEAN_Y,
      y: OCEAN_Y,
      jumpPhase: 0,
      jumpSpeed: Math.random() * 0.02 + 0.025,
      jumpHeight: Math.random() * 120 + 100,
      speed: speed,
      width: 70,
      height: 30,
      wobble: Math.random() * Math.PI * 2,
      winking: false,
      paused: false,
      pauseTimer: 0,
      pauseDuration: 90 + Math.floor(Math.random() * 40), // frames to pause at peak ~1.5-2 seconds
      hasPaused: false,
      color: ['#6eb5ff', '#a0d2ff', '#87ceeb'][Math.floor(Math.random() * 3)]
    });
  } else {
    // Butterflies fly in the sky
    const y = Math.random() * (OCEAN_Y - 100) + 40;
    obstacles.push({
      type: 'butterfly',
      x: W + 40,
      y: y,
      speed: speed * 0.8,
      width: 35,
      height: 30,
      wobble: Math.random() * Math.PI * 2,
      wingOpen: 0,
      color: ['#ff69b4', '#dda0dd', '#ff6347', '#ffa500', '#9370db'][Math.floor(Math.random() * 5)]
    });
  }
}

// ============ DRAWING FUNCTIONS ============

function drawSky() {
  // Beautiful sunset/magical sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, OCEAN_Y);
  grad.addColorStop(0, '#1a0a3e');
  grad.addColorStop(0.2, '#2a1060');
  grad.addColorStop(0.45, '#5a2080');
  grad.addColorStop(0.7, '#c06090');
  grad.addColorStop(0.85, '#f0a070');
  grad.addColorStop(1, '#ffcc88');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, OCEAN_Y + 5);

  // Stars
  stars.forEach(s => {
    s.twinkle += 0.03;
    s.x -= s.speed;
    if (s.x < -5) s.x = W + 5;
    const alpha = 0.3 + Math.sin(s.twinkle) * 0.25;
    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  });

  // Clouds
  clouds.forEach(c => {
    c.x -= c.speed;
    if (c.x < -c.width) { c.x = W + c.width; c.y = Math.random() * OCEAN_Y * 0.4 + 30; }
    ctx.fillStyle = `rgba(255, 200, 230, ${c.opacity})`;
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.width / 2, c.width / 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x - c.width * 0.25, c.y - 10, c.width / 3, c.width / 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x + c.width * 0.2, c.y - 5, c.width / 3.5, c.width / 5, 0, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawRainbow() {
  // Big beautiful rainbow arc behind the scene
  const rainbowColors = [
    'rgba(255, 0, 0, 0.18)',
    'rgba(255, 127, 0, 0.18)',
    'rgba(255, 255, 0, 0.18)',
    'rgba(0, 200, 0, 0.18)',
    'rgba(0, 100, 255, 0.18)',
    'rgba(75, 0, 130, 0.18)',
    'rgba(148, 0, 211, 0.18)',
  ];

  const cx = W * 0.5;
  const cy = OCEAN_Y + 20;
  const baseR = Math.max(W, H) * 0.65;

  for (let i = 0; i < rainbowColors.length; i++) {
    ctx.strokeStyle = rainbowColors[i];
    ctx.lineWidth = 14;
    ctx.beginPath();
    ctx.arc(cx, cy, baseR - i * 14, Math.PI, 0);
    ctx.stroke();
  }
}

function drawOcean() {
  // Ocean gradient
  const oceanGrad = ctx.createLinearGradient(0, OCEAN_Y, 0, H);
  oceanGrad.addColorStop(0, '#1a6baa');
  oceanGrad.addColorStop(0.15, '#1570b8');
  oceanGrad.addColorStop(0.4, '#0e5a99');
  oceanGrad.addColorStop(0.7, '#084a80');
  oceanGrad.addColorStop(1, '#063a68');
  ctx.fillStyle = oceanGrad;
  ctx.fillRect(0, OCEAN_Y, W, H - OCEAN_Y);

  // Animated wave line at top of ocean
  ctx.strokeStyle = 'rgba(150, 220, 255, 0.5)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  for (let x = 0; x <= W; x += 4) {
    const wIdx = Math.floor((x / W) * oceanWaves.length);
    const w = oceanWaves[Math.min(wIdx, oceanWaves.length - 1)];
    const waveY = OCEAN_Y + Math.sin(frameCount * w.speed + w.phase + x * 0.02) * w.amp;
    if (x === 0) ctx.moveTo(x, waveY);
    else ctx.lineTo(x, waveY);
  }
  ctx.stroke();

  // Second wave line
  ctx.strokeStyle = 'rgba(100, 200, 255, 0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let x = 0; x <= W; x += 4) {
    const waveY = OCEAN_Y + 8 + Math.sin(frameCount * 0.03 + x * 0.015 + 2) * 3;
    if (x === 0) ctx.moveTo(x, waveY);
    else ctx.lineTo(x, waveY);
  }
  ctx.stroke();

  // Shimmer/sparkle on water
  for (let i = 0; i < 12; i++) {
    const sx = ((frameCount * 0.5 + i * 73) % (W + 20)) - 10;
    const sy = OCEAN_Y + 5 + Math.sin(frameCount * 0.02 + i) * 3 + (i % 4) * 15;
    const alpha = 0.2 + Math.sin(frameCount * 0.05 + i * 1.7) * 0.15;
    ctx.fillStyle = `rgba(200, 240, 255, ${alpha})`;
    ctx.beginPath();
    ctx.ellipse(sx, sy, 8, 2, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBgNarwhalSmall(n) {
  ctx.save();
  ctx.translate(n.x, n.y);
  ctx.scale(-n.scale, n.scale); // flipped to face left (swimming direction)

  // Body
  ctx.fillStyle = n.color;
  ctx.beginPath();
  ctx.ellipse(0, 0, 25, 11, 0, 0, Math.PI * 2);
  ctx.fill();

  // Belly
  ctx.fillStyle = '#d8ecff';
  ctx.beginPath();
  ctx.ellipse(2, 3, 18, 6, 0, 0, Math.PI);
  ctx.fill();

  // Rainbow horn
  drawRainbowHorn(ctx, 22, -3, 35, -7, 22, 1, 0.6);

  // Tail
  ctx.fillStyle = n.color;
  ctx.beginPath();
  ctx.moveTo(-23, 0);
  ctx.quadraticCurveTo(-33, -10, -36, -12);
  ctx.quadraticCurveTo(-30, 0, -36, 12);
  ctx.quadraticCurveTo(-33, 10, -23, 0);
  ctx.fill();

  // Eye - winking when jumping
  if (n.winking && n.winkTimer > 0) {
    // Pulsing glow
    const pulse = Math.sin(frameCount * 0.15) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(255, 215, 0, ${pulse * 0.25})`;
    ctx.beginPath();
    ctx.arc(14, -2, 10, 0, Math.PI * 2);
    ctx.fill();

    // Big wink eye
    ctx.strokeStyle = '#1a1a3a';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(14, -1, 4, 0.2, Math.PI - 0.2);
    ctx.stroke();

    // Eyelash lines
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 3; i++) {
      const angle = 0.4 + i * 0.7;
      ctx.beginPath();
      ctx.moveTo(14 + Math.cos(angle) * 4, -1 - Math.sin(angle) * 4);
      ctx.lineTo(14 + Math.cos(angle) * 7, -1 - Math.sin(angle) * 7);
      ctx.stroke();
    }

    // Sparkle stars
    ctx.fillStyle = '#ffd700';
    drawTinyStar(ctx, 22, -8, 4 * pulse);
    drawTinyStar(ctx, 8, -9, 3 * pulse);

    // Happy smile
    ctx.strokeStyle = '#e05080';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(14, 2, 5, 0.1, Math.PI * 0.7);
    ctx.stroke();

    // Extra blush
    ctx.fillStyle = 'rgba(255, 120, 160, 0.45)';
    ctx.beginPath();
    ctx.ellipse(16, 3, 5, 3, 0, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.fillStyle = '#1a1a3a';
    ctx.beginPath();
    ctx.arc(14, -2, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(15, -3, 1, 0, Math.PI * 2);
    ctx.fill();

    // Smile
    ctx.strokeStyle = '#4a6a8a';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.arc(14, 1, 3, 0, Math.PI * 0.6);
    ctx.stroke();
  }

  ctx.restore();
}

function drawBgButterflySmall(b) {
  ctx.save();
  ctx.translate(b.x, b.y + Math.sin(b.wobble) * 5);
  ctx.scale(b.scale, b.scale);

  const wingOpen = Math.sin(b.wingOpen) * 0.7;

  // Wings
  ctx.globalAlpha = 0.6;
  ctx.fillStyle = b.color;
  ctx.save();
  ctx.scale(1, wingOpen);
  ctx.beginPath();
  ctx.ellipse(-6, -4, 11, 8, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.save();
  ctx.scale(1, -wingOpen);
  ctx.fillStyle = b.color;
  ctx.beginPath();
  ctx.ellipse(-6, -4, 11, 8, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1;

  // Body
  ctx.fillStyle = '#2a1a3a';
  ctx.beginPath();
  ctx.ellipse(0, 0, 2, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawRainbowHorn(c, x1, y1, x2, y2, x3, y3, lineW) {
  // Draw a horn shape filled with rainbow stripes
  const colors = ['#ff0000', '#ff8800', '#ffff00', '#00cc00', '#0088ff', '#8800ff'];
  const steps = colors.length;
  for (let i = 0; i < steps; i++) {
    const t = i / steps;
    const t2 = (i + 1) / steps;
    // Interpolate positions along the horn triangle
    const lx1 = x1 + (x2 - x1) * t;
    const ly1 = y1 + (y2 - y1) * t;
    const lx2 = x1 + (x2 - x1) * t2;
    const ly2 = y1 + (y2 - y1) * t2;
    const rx1 = x3 + (x2 - x3) * t;
    const ry1 = y3 + (y2 - y3) * t;
    const rx2 = x3 + (x2 - x3) * t2;
    const ry2 = y3 + (y2 - y3) * t2;

    c.fillStyle = colors[i];
    c.beginPath();
    c.moveTo(lx1, ly1);
    c.lineTo(lx2, ly2);
    c.lineTo(rx2, ry2);
    c.lineTo(rx1, ry1);
    c.closePath();
    c.fill();
  }
  // Sparkle at tip
  c.fillStyle = `rgba(255, 255, 255, ${0.5 + Math.sin(frameCount * 0.1) * 0.3})`;
  c.beginPath();
  c.arc(x2, y2, lineW + 1, 0, Math.PI * 2);
  c.fill();
}

function drawTinyStar(c, x, y, size) {
  c.save();
  c.translate(x, y);
  c.rotate(frameCount * 0.05);
  c.beginPath();
  for (let i = 0; i < 5; i++) {
    const angle = (i * Math.PI * 2) / 5 - Math.PI / 2;
    c.lineTo(Math.cos(angle) * size, Math.sin(angle) * size);
    const innerAngle = angle + Math.PI / 5;
    c.lineTo(Math.cos(innerAngle) * size * 0.4, Math.sin(innerAngle) * size * 0.4);
  }
  c.closePath();
  c.fill();
  c.restore();
}

function drawSplashes() {
  splashes.forEach(s => {
    ctx.fillStyle = `rgba(180, 220, 255, ${s.life})`;
    ctx.beginPath();
    ctx.ellipse(s.x, s.y, s.size * 2, s.size * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // Water droplets
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.arc(s.x + (i - 1) * 8, s.y - s.size * s.life * 10 - i * 4, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  });
}

function spawnGem() {
  const y = Math.random() * (OCEAN_Y - 120) + 50;
  gems.push({
    x: W + 30,
    y: y,
    speed: 2 + difficulty * 0.5,
    size: 18,
    wobble: Math.random() * Math.PI * 2,
    sparklePhase: Math.random() * Math.PI * 2,
    collected: false,
  });
}

function drawGem(g) {
  ctx.save();
  ctx.translate(g.x, g.y + Math.sin(g.wobble) * 6);
  ctx.rotate(Math.sin(g.sparklePhase * 0.5) * 0.15);

  const s = g.size;
  const pulse = 1 + Math.sin(g.sparklePhase) * 0.1;
  const sz = s * pulse;

  // Outer glow
  const glowAlpha = 0.25 + Math.sin(g.sparklePhase) * 0.1;
  ctx.fillStyle = `rgba(255, 200, 100, ${glowAlpha})`;
  ctx.beginPath();
  ctx.arc(0, 0, sz + 8, 0, Math.PI * 2);
  ctx.fill();

  // Diamond shape with rainbow gradient
  const grad = ctx.createLinearGradient(-sz, -sz, sz, sz);
  grad.addColorStop(0, '#ff0000');
  grad.addColorStop(0.17, '#ff8800');
  grad.addColorStop(0.33, '#ffff00');
  grad.addColorStop(0.5, '#00cc00');
  grad.addColorStop(0.67, '#0088ff');
  grad.addColorStop(0.83, '#8800ff');
  grad.addColorStop(1, '#ff00aa');

  // Gem body - diamond shape
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(0, -sz);       // top
  ctx.lineTo(sz * 0.8, 0);  // right
  ctx.lineTo(0, sz);        // bottom
  ctx.lineTo(-sz * 0.8, 0); // left
  ctx.closePath();
  ctx.fill();

  // White highlight facet
  ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
  ctx.beginPath();
  ctx.moveTo(0, -sz);
  ctx.lineTo(sz * 0.3, -sz * 0.2);
  ctx.lineTo(0, 0);
  ctx.lineTo(-sz * 0.3, -sz * 0.2);
  ctx.closePath();
  ctx.fill();

  // Inner shine
  ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
  ctx.beginPath();
  ctx.moveTo(-sz * 0.15, -sz * 0.6);
  ctx.lineTo(sz * 0.15, -sz * 0.4);
  ctx.lineTo(sz * 0.05, -sz * 0.2);
  ctx.lineTo(-sz * 0.2, -sz * 0.3);
  ctx.closePath();
  ctx.fill();

  // Border
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, -sz);
  ctx.lineTo(sz * 0.8, 0);
  ctx.lineTo(0, sz);
  ctx.lineTo(-sz * 0.8, 0);
  ctx.closePath();
  ctx.stroke();

  // Sparkle stars orbiting
  const sparkleColors = ['#ffffff', '#ffd700', '#ff69b4', '#87ceeb'];
  for (let i = 0; i < 4; i++) {
    const angle = g.sparklePhase + i * Math.PI * 0.5;
    const dist = sz + 6 + Math.sin(g.sparklePhase * 2 + i) * 3;
    const sx = Math.cos(angle) * dist;
    const sy = Math.sin(angle) * dist;
    const starSize = 2.5 + Math.sin(g.sparklePhase * 3 + i * 2) * 1;
    ctx.fillStyle = sparkleColors[i];
    drawTinyStar(ctx, sx, sy, starSize);
  }

  ctx.restore();
}

function drawGemCollectEffect(x, y) {

}

function drawRainbowTrail() {
  if (rainbowTrail.length < 2) return;
  const colors = ['#ff0000', '#ff8800', '#ffff00', '#00ff00', '#0088ff', '#8800ff'];

  for (let c = 0; c < colors.length; c++) {
    ctx.strokeStyle = colors[c];
    ctx.lineWidth = 3;
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    for (let i = 0; i < rainbowTrail.length; i++) {
      const p = rainbowTrail[i];
      const yOff = (c - 2.5) * 4;
      if (i === 0) ctx.moveTo(p.x, p.y + yOff);
      else ctx.lineTo(p.x, p.y + yOff);
    }
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawUnicorn(x, y) {
  ctx.save();
  ctx.translate(x, y);

  const rot = Math.max(-0.4, Math.min(0.4, unicorn.vy * 0.04));
  ctx.rotate(rot);

  // Body
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.ellipse(0, 10, 28, 18, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#e0d0f0';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Legs
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(-15, 24, 6, 12);
  ctx.fillRect(-3, 24, 6, 12);
  ctx.fillRect(8, 24, 6, 12);
  ctx.fillRect(18, 24, 6, 12);
  // Hooves
  ctx.fillStyle = '#dda0dd';
  ctx.fillRect(-15, 33, 6, 4);
  ctx.fillRect(-3, 33, 6, 4);
  ctx.fillRect(8, 33, 6, 4);
  ctx.fillRect(18, 33, 6, 4);

  // RAINBOW WINGS
  const wingFlap = Math.sin(unicorn.wingAngle) * 0.8;
  const wingColors = [
    ['rgba(255, 0, 0, 0.35)', 'rgba(255, 127, 0, 0.35)', 'rgba(255, 255, 0, 0.35)'],
    ['rgba(0, 200, 0, 0.4)', 'rgba(0, 100, 255, 0.4)', 'rgba(148, 0, 211, 0.4)'],
  ];

  ctx.save();
  ctx.translate(-5, 0);

  // Back wing layers (rainbow gradient via layered shapes)
  for (let layer = 0; layer < 3; layer++) {
    ctx.fillStyle = wingColors[0][layer];
    ctx.beginPath();
    ctx.moveTo(0, 5);
    const spread = layer * 5;
    ctx.quadraticCurveTo(-30 - spread, -25 + wingFlap * 25 - layer * 4, -10 - spread, -35 + wingFlap * 30 - layer * 3);
    ctx.quadraticCurveTo(5, -15 + wingFlap * 10, 0, 5);
    ctx.fill();
  }

  // Front wing layers
  for (let layer = 0; layer < 3; layer++) {
    ctx.fillStyle = wingColors[1][layer];
    ctx.beginPath();
    ctx.moveTo(0, 5);
    const spread = layer * 4;
    ctx.quadraticCurveTo(-25 - spread, -30 + wingFlap * 28 - layer * 4, -5 - spread, -40 + wingFlap * 35 - layer * 3);
    ctx.quadraticCurveTo(10, -18 + wingFlap * 12, 0, 5);
    ctx.fill();
  }

  // Wing sparkles
  if (unicorn.wingSpeed > 2) {
    for (let i = 0; i < 3; i++) {
      ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.5 + 0.3})`;
      ctx.beginPath();
      ctx.arc(-15 + Math.random() * 15, -25 + wingFlap * 20 + Math.random() * 10, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();

  // Tail (rainbow)
  const tailColors = ['#ff0000', '#ff8800', '#ffff00', '#00cc00', '#0088ff', '#8800ff'];
  for (let i = 0; i < tailColors.length; i++) {
    ctx.strokeStyle = tailColors[i];
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    const tailWave = Math.sin(frameCount * 0.1 + i * 0.3) * 5;
    ctx.moveTo(-26, 5 + i * 2);
    ctx.quadraticCurveTo(-40, 0 + i * 2 + tailWave, -45 - i * 2, -5 + i * 3 + tailWave);
    ctx.stroke();
  }

  // Head
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.ellipse(28, -2, 14, 13, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#e0d0f0';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Ear
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.moveTo(25, -13);
  ctx.lineTo(22, -22);
  ctx.lineTo(28, -15);
  ctx.fill();
  ctx.fillStyle = '#ffb6c1';
  ctx.beginPath();
  ctx.moveTo(25, -14);
  ctx.lineTo(23, -20);
  ctx.lineTo(27, -15);
  ctx.fill();

  // RAINBOW HORN
  drawRainbowHorn(ctx, 28, -14, 32, -36, 34, -13, 1);

  // Eye
  ctx.fillStyle = '#2a1a4a';
  ctx.beginPath();
  ctx.ellipse(33, -3, 4, 4.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(34.5, -4.5, 1.8, 0, Math.PI * 2);
  ctx.fill();
  // Eyelashes
  ctx.strokeStyle = '#2a1a4a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(35, -7); ctx.lineTo(37, -9);
  ctx.moveTo(33, -7.5); ctx.lineTo(34, -10);
  ctx.stroke();

  // Blush
  ctx.fillStyle = 'rgba(255, 150, 180, 0.4)';
  ctx.beginPath();
  ctx.ellipse(36, 2, 4, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Smile
  ctx.strokeStyle = '#b06080';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.arc(34, 1, 4, 0.1, Math.PI * 0.7);
  ctx.stroke();

  // Mane (rainbow!)
  const maneColors = ['#ff0000', '#ff8800', '#ffff00', '#00cc00', '#0088ff'];
  for (let i = 0; i < maneColors.length; i++) {
    ctx.fillStyle = maneColors[i];
    const maneWave = Math.sin(frameCount * 0.12 + i * 0.8) * 3;
    ctx.beginPath();
    ctx.ellipse(18 - i * 5, -12 + maneWave, 7, 5 + i, -0.3 + i * 0.1, 0, Math.PI * 2);
    ctx.fill();
  }

  // Girl rider
  drawGirl(0, -18);

  ctx.restore();
}

function drawGirl(x, y) {
  ctx.save();
  ctx.translate(x, y);

  // Dress
  ctx.fillStyle = '#ff69b4';
  ctx.beginPath();
  ctx.moveTo(-5, 0);
  ctx.lineTo(-8, 15);
  ctx.lineTo(8, 15);
  ctx.lineTo(5, 0);
  ctx.fill();
  ctx.fillStyle = '#ff85c8';
  ctx.beginPath();
  ctx.moveTo(-3, 5);
  ctx.lineTo(-6, 15);
  ctx.lineTo(0, 15);
  ctx.fill();

  // Arms
  ctx.strokeStyle = '#ffdab9';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-5, 3); ctx.lineTo(-10, 10);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(5, 3); ctx.lineTo(12, 8);
  ctx.stroke();

  // Head
  ctx.fillStyle = '#ffdab9';
  ctx.beginPath();
  ctx.arc(0, -6, 7, 0, Math.PI * 2);
  ctx.fill();

  // Hair
  ctx.fillStyle = '#8B4513';
  ctx.beginPath();
  ctx.arc(0, -8, 7, -Math.PI, 0);
  ctx.fill();
  const hairWave = Math.sin(frameCount * 0.08) * 3;
  ctx.beginPath();
  ctx.moveTo(-5, -6);
  ctx.quadraticCurveTo(-12, 0 + hairWave, -14, 10 + hairWave);
  ctx.quadraticCurveTo(-10, 8, -7, -2);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-3, -5);
  ctx.quadraticCurveTo(-10, 2 + hairWave, -11, 14 + hairWave);
  ctx.quadraticCurveTo(-8, 10, -5, -1);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#2a1a4a';
  ctx.beginPath();
  ctx.arc(-2.5, -6, 1.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(2.5, -6, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // Smile
  ctx.strokeStyle = '#d46a84';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.arc(0, -4, 3, 0.1, Math.PI - 0.1);
  ctx.stroke();

  // Tiara
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.moveTo(-4, -13);
  ctx.lineTo(-3, -17);
  ctx.lineTo(-1, -14);
  ctx.lineTo(0, -18);
  ctx.lineTo(1, -14);
  ctx.lineTo(3, -17);
  ctx.lineTo(4, -13);
  ctx.fill();
  ctx.fillStyle = '#ff69b4';
  ctx.beginPath();
  ctx.arc(0, -15, 1.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawNarwhal(ob) {
  ctx.save();
  ctx.translate(ob.x, ob.y);

  // Flip to face left (swimming direction)
  ctx.scale(-1, 1);

  // Rotation based on jump arc
  const jumpProgress = ob.jumpPhase / Math.PI;
  const jumpRot = jumpProgress < 0.5 ? -0.3 * Math.sin(jumpProgress * Math.PI) : 0.3 * Math.sin(jumpProgress * Math.PI);
  ctx.rotate(jumpRot);

  // Body
  ctx.fillStyle = ob.color;
  ctx.beginPath();
  ctx.ellipse(0, 0, 30, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // Belly
  ctx.fillStyle = '#e8f4ff';
  ctx.beginPath();
  ctx.ellipse(2, 4, 22, 8, 0, 0, Math.PI);
  ctx.fill();

  // RAINBOW HORN (tusk)
  drawRainbowHorn(ctx, 28, -3, 55, -8, 28, 1, 0.8);

  // Tail
  ctx.fillStyle = ob.color;
  ctx.beginPath();
  ctx.moveTo(-28, 0);
  ctx.quadraticCurveTo(-38, -12, -42, -15);
  ctx.quadraticCurveTo(-36, 0, -42, 15);
  ctx.quadraticCurveTo(-38, 12, -28, 0);
  ctx.fill();

  // Fin
  ctx.fillStyle = ob.color;
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  ctx.moveTo(-5, -12);
  ctx.quadraticCurveTo(0, -22, 8, -18);
  ctx.quadraticCurveTo(2, -12, -5, -12);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Eye - WINKING at peak!
  if (ob.winking) {
    // BIG obvious wink animation
    // Pulsing glow ring around the eye area
    const pulse = Math.sin(frameCount * 0.15) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(255, 215, 0, ${pulse * 0.3})`;
    ctx.beginPath();
    ctx.arc(18, -2, 12, 0, Math.PI * 2);
    ctx.fill();

    // Closed winking eye - thick happy curve
    ctx.strokeStyle = '#1a1a3a';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(18, -1, 5, 0.2, Math.PI - 0.2);
    ctx.stroke();

    // Cute eyelash lines radiating from the wink
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      const angle = 0.4 + i * 0.7;
      ctx.beginPath();
      ctx.moveTo(18 + Math.cos(angle) * 5, -1 - Math.sin(angle) * 5);
      ctx.lineTo(18 + Math.cos(angle) * 8, -1 - Math.sin(angle) * 8);
      ctx.stroke();
    }

    // Multiple spinning sparkle stars around the wink
    ctx.fillStyle = '#ffd700';
    drawTinyStar(ctx, 28, -10, 5 * pulse);
    drawTinyStar(ctx, 10, -12, 4 * pulse);
    drawTinyStar(ctx, 26, 4, 3.5 * pulse);

    // Little pink hearts floating up
    const heartY = -14 - (frameCount % 30) * 0.5;
    ctx.fillStyle = '#ff69b4';
    ctx.font = 'bold 12px "Comic Sans MS", cursive';
    ctx.save();
    ctx.scale(-1, 1); // un-flip text so hearts read correctly
    ctx.fillText('\u2665', -30, heartY);
    ctx.fillText('\u2665', -12, heartY - 6);
    ctx.restore();

    // Extra blush when winking - bigger and pinker
    ctx.fillStyle = 'rgba(255, 120, 160, 0.5)';
    ctx.beginPath();
    ctx.ellipse(20, 3, 6, 3.5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Big happy smile
    ctx.strokeStyle = '#e05080';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(18, 2, 6, 0.1, Math.PI * 0.7);
    ctx.stroke();
  } else {
    // Normal open eye
    ctx.fillStyle = '#1a1a3a';
    ctx.beginPath();
    ctx.arc(18, -3, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(19, -4, 1.2, 0, Math.PI * 2);
    ctx.fill();

    // Normal blush
    ctx.fillStyle = 'rgba(255, 150, 180, 0.3)';
    ctx.beginPath();
    ctx.ellipse(20, 2, 4, 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Normal smile
    ctx.strokeStyle = '#4a6a8a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(18, 1, 4, 0, Math.PI * 0.6);
    ctx.stroke();
  }

  // Bubbles when near water
  if (ob.y > ob.baseY - 30) {
    if (frameCount % 20 < 10) {
      ctx.fillStyle = 'rgba(180, 230, 255, 0.5)';
      ctx.beginPath();
      ctx.arc(25, -10 - (frameCount % 20), 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(20, -14 - (frameCount % 15), 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.restore();
}

function drawButterfly(ob) {
  ctx.save();
  ctx.translate(ob.x, ob.y);

  const wingOpen = Math.sin(ob.wingOpen) * 0.8;
  const wobbleY = Math.sin(ob.wobble) * 8;
  ctx.translate(0, wobbleY);

  // Wings
  ctx.fillStyle = ob.color;
  ctx.globalAlpha = 0.7;

  ctx.save();
  ctx.scale(1, wingOpen);
  ctx.beginPath();
  ctx.ellipse(-8, -5, 14, 10, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
  ctx.beginPath();
  ctx.ellipse(-10, -5, 6, 4, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.scale(1, -wingOpen);
  ctx.fillStyle = ob.color;
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  ctx.ellipse(-8, -5, 14, 10, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
  ctx.beginPath();
  ctx.ellipse(-10, -5, 6, 4, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.scale(1, wingOpen * 0.8);
  ctx.fillStyle = ob.color;
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.ellipse(-5, 5, 10, 8, 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.scale(1, -wingOpen * 0.8);
  ctx.fillStyle = ob.color;
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.ellipse(-5, 5, 10, 8, 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.globalAlpha = 1;

  // Body
  ctx.fillStyle = '#2a1a3a';
  ctx.beginPath();
  ctx.ellipse(0, 0, 3, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.fillStyle = '#2a1a3a';
  ctx.beginPath();
  ctx.arc(2, -8, 3, 0, Math.PI * 2);
  ctx.fill();

  // Antennae
  ctx.strokeStyle = '#2a1a3a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(2, -11);
  ctx.quadraticCurveTo(6, -18, 8, -16);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(2, -11);
  ctx.quadraticCurveTo(-2, -18, -4, -16);
  ctx.stroke();
  ctx.fillStyle = ob.color;
  ctx.beginPath();
  ctx.arc(8, -16, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(-4, -16, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(3.5, -8.5, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#1a1a3a';
  ctx.beginPath();
  ctx.arc(4, -8.5, 0.8, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawSparkles() {
  sparkles.forEach(s => {
    ctx.fillStyle = s.color;
    ctx.globalAlpha = s.life;
    drawTinyStar(ctx, s.x, s.y, s.size);
    ctx.globalAlpha = 1;
  });
}

function drawHUD() {
  // Gem counter - top right
  ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
  ctx.beginPath();
  ctx.roundRect(W - 130, 8, 120, 40, 20);
  ctx.fill();

  // Mini gem icon
  ctx.save();
  ctx.translate(W - 110, 28);
  const gs = 10;
  const miniGrad = ctx.createLinearGradient(-gs, -gs, gs, gs);
  miniGrad.addColorStop(0, '#ff0000');
  miniGrad.addColorStop(0.33, '#ffff00');
  miniGrad.addColorStop(0.67, '#0088ff');
  miniGrad.addColorStop(1, '#ff00aa');
  ctx.fillStyle = miniGrad;
  ctx.beginPath();
  ctx.moveTo(0, -gs); ctx.lineTo(gs * 0.7, 0); ctx.lineTo(0, gs); ctx.lineTo(-gs * 0.7, 0);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.moveTo(0, -gs); ctx.lineTo(gs * 0.2, -gs * 0.2); ctx.lineTo(0, 0); ctx.lineTo(-gs * 0.2, -gs * 0.2);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Gem count text
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 22px "Comic Sans MS", cursive';
  ctx.textAlign = 'center';
  ctx.fillText(gemsCollected, W - 60, 35);

  // Timer - top left
  ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
  ctx.beginPath();
  ctx.roundRect(10, 8, 80, 40, 20);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 20px "Comic Sans MS", cursive';
  ctx.textAlign = 'center';
  ctx.fillText(playSeconds + 's', 50, 35);

  // Dodged counter - top center
  ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
  ctx.beginPath();
  ctx.roundRect(W / 2 - 55, 8, 110, 40, 20);
  ctx.fill();
  ctx.fillStyle = '#90ee90';
  ctx.font = 'bold 18px "Comic Sans MS", cursive';
  ctx.textAlign = 'center';
  ctx.fillText('Dodged: ' + obstaclesAvoided, W / 2, 35);
}

function drawTitle() {
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 26px "Comic Sans MS", cursive';
  ctx.textAlign = 'center';
  ctx.strokeStyle = '#8B008B';
  ctx.lineWidth = 3;
  ctx.strokeText('Unicorns, butterflies,', W / 2, H * 0.12);
  ctx.fillText('Unicorns, butterflies,', W / 2, H * 0.12);
  ctx.font = 'bold 30px "Comic Sans MS", cursive';
  ctx.strokeText('and gems, oh my!', W / 2, H * 0.12 + 38);
  ctx.fillText('and gems, oh my!', W / 2, H * 0.12 + 38);

  const floatY = Math.sin(frameCount * 0.03) * 15;
  drawUnicorn(W * 0.5 - 20, H * 0.38 + floatY);

  ctx.fillStyle = '#ffffff';
  ctx.font = '20px "Comic Sans MS", cursive';
  ctx.fillText('Press SPACE or Tap to fly!', W / 2, OCEAN_Y - 35);

  ctx.fillStyle = '#dda0dd';
  ctx.font = '16px "Comic Sans MS", cursive';
  ctx.fillText('Avoid the narwhals & butterflies!', W / 2, OCEAN_Y - 12);

  if (highScore > 0) {
    ctx.fillStyle = '#ffd700';
    ctx.font = '18px "Comic Sans MS", cursive';
    ctx.fillText(`Best Gems: ${highScore}`, W / 2, OCEAN_Y + 35);
  }
}

function drawGameOver() {
  // Dark overlay
  ctx.fillStyle = 'rgba(15, 5, 30, 0.75)';
  ctx.fillRect(0, 0, W, H);

  // Decorative sparkly border
  const borderPulse = Math.sin(frameCount * 0.05) * 0.2 + 0.8;
  ctx.strokeStyle = `rgba(255, 200, 100, ${borderPulse * 0.4})`;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.roundRect(W * 0.1, H * 0.05, W * 0.8, H * 0.9, 20);
  ctx.stroke();

  // Inner panel
  ctx.fillStyle = 'rgba(40, 15, 60, 0.85)';
  ctx.beginPath();
  ctx.roundRect(W * 0.1 + 4, H * 0.05 + 4, W * 0.8 - 8, H * 0.9 - 8, 18);
  ctx.fill();

  ctx.textAlign = 'center';

  // Title
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 32px "Comic Sans MS", cursive';
  ctx.strokeStyle = '#8B008B';
  ctx.lineWidth = 3;
  ctx.strokeText('Oh my!', W / 2, H * 0.14);
  ctx.fillText('Oh my!', W / 2, H * 0.14);

  // Draw the princess and unicorn in the center, bigger
  ctx.save();
  const centerX = W / 2 - 10;
  const centerY = H * 0.35;
  const floatY = Math.sin(frameCount * 0.04) * 5;
  // Glow behind them
  ctx.fillStyle = 'rgba(255, 200, 255, 0.1)';
  ctx.beginPath();
  ctx.arc(centerX, centerY + floatY, 70, 0, Math.PI * 2);
  ctx.fill();
  drawUnicorn(centerX, centerY + floatY);
  ctx.restore();

  // Stats section
  const statsY = H * 0.56;
  const lineH = 36;

  // Time
  ctx.fillStyle = '#87ceeb';
  ctx.font = 'bold 22px "Comic Sans MS", cursive';
  ctx.fillText(`Time: ${playSeconds} seconds`, W / 2, statsY);

  // Gems with mini gem icon
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 22px "Comic Sans MS", cursive';
  ctx.fillText(`Gems: ${gemsCollected}`, W / 2, statsY + lineH);

  // Avoided count
  ctx.fillStyle = '#90ee90';
  ctx.font = 'bold 22px "Comic Sans MS", cursive';
  ctx.fillText(`Dodged: ${obstaclesAvoided}`, W / 2, statsY + lineH * 2);

  // High score
  if (gemsCollected >= highScore && gemsCollected > 0) {
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 20px "Comic Sans MS", cursive';
    const starPulse = Math.sin(frameCount * 0.1) > 0 ? '  ' : '  ';
    ctx.fillText('New Best Gems!', W / 2, statsY + lineH * 3);
  } else if (highScore > 0) {
    ctx.fillStyle = '#dda0dd';
    ctx.font = '18px "Comic Sans MS", cursive';
    ctx.fillText(`Best Gems: ${highScore}`, W / 2, statsY + lineH * 3);
  }

  // Restart prompt
  const blink = Math.sin(frameCount * 0.08) > 0;
  if (blink) {
    ctx.fillStyle = '#ffffff';
    ctx.font = '20px "Comic Sans MS", cursive';
    ctx.fillText('Press SPACE or Tap to play again!', W / 2, H * 0.92);
  }
}

function checkCollision(ob) {
  const ux = unicorn.x + 10;
  const uy = unicorn.y + 10;
  const ur = 20;

  let ox, oy, or2;
  if (ob.type === 'narwhal') {
    ox = ob.x + 10;
    oy = ob.y;
    or2 = 22;
  } else {
    ox = ob.x;
    oy = ob.y + Math.sin(ob.wobble) * 8;
    or2 = 14;
  }

  const dx = ux - ox;
  const dy = uy - oy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  return dist < ur + or2;
}

// ============ UPDATE ============

function update() {
  frameCount++;

  // Update background elements always
  // BG narwhals
  bgNarwhals.forEach(n => {
    n.x -= n.speed;
    if (n.jumping) {
      // Pause at peak to wink
      if (n.paused) {
        n.pauseTimer--;
        n.winking = true;
        n.winkTimer = 1;
        if (n.pauseTimer <= 0) {
          n.paused = false;
          n.winking = false;
          n.winkTimer = 0;
        }
      } else {
        n.jumpPhase += 0.025;
        n.winking = false;
        n.winkTimer = 0;
        // Trigger pause near peak
        if (!n.hasPaused && n.jumpPhase >= Math.PI * 0.45 && n.jumpPhase < Math.PI * 0.55) {
          n.paused = true;
          n.pauseTimer = 80;
          n.hasPaused = true;
        }
      }
      n.y = n.baseY - Math.sin(n.jumpPhase) * n.jumpHeight;
      if (n.jumpPhase > Math.PI) {
        n.jumping = false;
        n.jumpPhase = 0;
        n.y = n.baseY;
        n.winkTimer = 0;
        n.winking = false;
        n.hasPaused = false;
      }
    } else {
      n.y = n.baseY + Math.sin(frameCount * 0.02 + n.x * 0.01) * 3;
      if (Math.random() < 0.003) {
        n.jumping = true;
        n.jumpPhase = 0;
        n.jumpHeight = Math.random() * 40 + 30;
        n.hasPaused = false;
      }
    }
  });
  bgNarwhals = bgNarwhals.filter(n => n.x > -80);
  if (frameCount % 200 === 0 && bgNarwhals.length < 4) spawnBgNarwhal();

  // BG butterflies
  bgButterflies.forEach(b => {
    b.x -= b.speed;
    b.wobble += 0.04;
    b.wingOpen += 0.15;
  });
  bgButterflies = bgButterflies.filter(b => b.x > -40);
  if (frameCount % 150 === 0 && bgButterflies.length < 5) spawnBgButterfly();

  // Splashes
  splashes.forEach(s => { s.life -= 0.03; s.size += 0.3; });
  splashes = splashes.filter(s => s.life > 0);

  if (gameState === 'playing') {
    // Continuous lift while holding space/touch
    if (holdingFly) {
      unicorn.vy -= 0.35; // counteracts gravity and then some
      unicorn.vy = Math.max(unicorn.vy, -3.5); // cap upward speed while holding
      unicorn.wingSpeed = Math.max(unicorn.wingSpeed, 8); // keep wings flapping
      // Occasional sparkles while holding
      if (frameCount % 6 === 0) {
        sparkles.push({
          x: unicorn.x - 10 + Math.random() * 10,
          y: unicorn.y + 20 + Math.random() * 15,
          vx: -Math.random() * 2 - 0.5,
          vy: Math.random() * 2,
          life: 0.8,
          color: ['#ff69b4', '#ffd700', '#87ceeb', '#dda0dd', '#ff6347'][Math.floor(Math.random() * 5)],
          size: Math.random() * 3 + 1.5
        });
      }
    }

    // Physics
    unicorn.vy += GRAVITY;
    unicorn.vy = Math.min(unicorn.vy, MAX_FALL_SPEED);
    unicorn.y += unicorn.vy;

    unicorn.wingAngle += unicorn.wingSpeed * 0.15;
    unicorn.wingSpeed *= WING_DECAY;
    unicorn.flapPower *= 0.98;

    if (unicorn.y < -20) { unicorn.y = -20; unicorn.vy = 0; }
    if (unicorn.y > OCEAN_Y - 30) {
      // Hit the ocean = game over
      gameState = 'gameover';
      holdingFly = false;
      screenShake = 10;
      // Big splash!
      splashes.push({ x: unicorn.x + 10, y: OCEAN_Y, life: 1, size: 8 });
      if (gemsCollected > highScore) {
        highScore = gemsCollected;
        localStorage.setItem('unicornHighScore', highScore.toString());
      }
    }

    // Track play time
    playSeconds = Math.floor((Date.now() - playStartTime) / 1000);

    score += 0.02 * difficulty;
    difficulty = 1 + score * 0.005;
    difficulty = Math.min(difficulty, 3);

    const spawnRate = Math.max(40, 90 - score * 0.5);
    if (frameCount % Math.floor(spawnRate) === 0) {
      spawnObstacle();
    }

    // Spawn gems
    if (frameCount % 70 === 0) {
      spawnGem();
    }

    // Update gems
    gems.forEach(g => {
      g.x -= g.speed;
      g.wobble += 0.04;
      g.sparklePhase += 0.08;
    });

    // Check gem collection
    gems.forEach(g => {
      if (g.collected) return;
      const dx = (unicorn.x + 10) - g.x;
      const dy = (unicorn.y + 10) - (g.y + Math.sin(g.wobble) * 6);
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 35) {
        g.collected = true;
        gemsCollected++;
        // Big sparkle burst on collect!
        for (let i = 0; i < 12; i++) {
          const angle = (i / 12) * Math.PI * 2;
          sparkles.push({
            x: g.x,
            y: g.y,
            vx: Math.cos(angle) * 4,
            vy: Math.sin(angle) * 4,
            life: 1,
            color: ['#ff0000', '#ff8800', '#ffff00', '#00cc00', '#0088ff', '#8800ff', '#ff69b4', '#ffd700', '#ffffff'][Math.floor(Math.random() * 9)],
            size: Math.random() * 5 + 3
          });
        }
      }
    });

    // Remove off-screen or collected gems
    gems = gems.filter(g => g.x > -40 && !g.collected);

    // Update obstacles
    obstacles.forEach(ob => {
      ob.x -= ob.speed;
      if (ob.type === 'butterfly') {
        ob.wobble += 0.05;
        ob.wingOpen += 0.2;
        ob.y += Math.sin(ob.wobble) * 1.5;
      }
      if (ob.type === 'narwhal') {
        // Pause at peak to wink
        if (ob.paused) {
          ob.pauseTimer--;
          ob.winking = true;
          if (ob.pauseTimer <= 0) {
            ob.paused = false;
            ob.winking = false;
          }
        } else {
          ob.jumpPhase += ob.jumpSpeed;
          ob.winking = false;
          // Trigger pause near the peak (around PI/2)
          if (!ob.hasPaused && ob.jumpPhase >= Math.PI * 0.45 && ob.jumpPhase < Math.PI * 0.55) {
            ob.paused = true;
            ob.pauseTimer = ob.pauseDuration;
            ob.hasPaused = true;
          }
        }
        ob.y = ob.baseY - Math.sin(ob.jumpPhase) * ob.jumpHeight;
        // Create splash when entering/exiting water
        if (ob.jumpPhase > Math.PI && !ob.splashed) {
          splashes.push({ x: ob.x, y: OCEAN_Y, life: 1, size: 6 });
          ob.splashed = true;
        }
      }
    });

    // Count obstacles that passed the player as "avoided"
    obstacles.forEach(ob => {
      if (!ob.avoided && ob.x < unicorn.x - 50) {
        ob.avoided = true;
        obstaclesAvoided++;
      }
    });
    obstacles = obstacles.filter(ob => ob.x > -100);

    for (const ob of obstacles) {
      // Only collide if narwhal is above water
      if (ob.type === 'narwhal' && ob.y > OCEAN_Y - 10) continue;
      if (checkCollision(ob)) {
        gameState = 'gameover';
        holdingFly = false;
        screenShake = 15;
        if (gemsCollected > highScore) {
          highScore = gemsCollected;
          localStorage.setItem('unicornHighScore', highScore.toString());
        }
        for (let i = 0; i < 20; i++) {
          sparkles.push({
            x: unicorn.x + Math.random() * 40,
            y: unicorn.y + Math.random() * 30,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            life: 1,
            color: ['#ff69b4', '#ffd700', '#87ceeb', '#dda0dd', '#ff6347', '#9370db'][Math.floor(Math.random() * 6)],
            size: Math.random() * 6 + 3
          });
        }
        break;
      }
    }

    if (frameCount % 2 === 0) {
      rainbowTrail.push({ x: unicorn.x - 15, y: unicorn.y + 15 });
      if (rainbowTrail.length > 30) rainbowTrail.shift();
    }
    rainbowTrail.forEach(p => p.x -= 1.5);
    rainbowTrail = rainbowTrail.filter(p => p.x > -10);
  }

  sparkles.forEach(s => {
    s.x += s.vx;
    s.y += s.vy;
    s.life -= 0.02;
    s.vy += 0.05;
  });
  sparkles = sparkles.filter(s => s.life > 0);

  if (screenShake > 0) screenShake *= 0.9;
  if (screenShake < 0.5) screenShake = 0;
}

// ============ DRAW ============

function draw() {
  ctx.save();

  if (screenShake > 0) {
    ctx.translate(
      (Math.random() - 0.5) * screenShake,
      (Math.random() - 0.5) * screenShake
    );
  }

  // Sky
  drawSky();

  // Rainbow behind ocean
  drawRainbow();

  // Background butterflies (behind everything)
  bgButterflies.forEach(b => drawBgButterflySmall(b));

  // Ocean
  drawOcean();

  // Background narwhals (in/around ocean)
  bgNarwhals.forEach(n => {
    ctx.save();
    // Clip narwhals that are below water surface to look like they're swimming
    if (!n.jumping || n.y > OCEAN_Y - 5) {
      // Partially submerged - just draw them, ocean was already drawn on top
    }
    drawBgNarwhalSmall(n);
    ctx.restore();
  });

  // Splashes
  drawSplashes();

  if (gameState === 'title') {
    unicorn.wingAngle += 0.08;
    drawTitle();
    drawSparkles();
  }

  if (gameState === 'playing') {
    drawRainbowTrail();

    // Draw gems
    gems.forEach(g => drawGem(g));

    // Draw game obstacles
    obstacles.forEach(ob => {
      if (ob.type === 'narwhal') drawNarwhal(ob);
      else drawButterfly(ob);
    });

    drawUnicorn(unicorn.x, unicorn.y);
    drawSparkles();
    drawHUD();
  }

  if (gameState === 'gameover') {
    drawRainbowTrail();
    obstacles.forEach(ob => {
      if (ob.type === 'narwhal') drawNarwhal(ob);
      else drawButterfly(ob);
    });
    drawUnicorn(unicorn.x, unicorn.y);
    drawSparkles();
    drawGameOver();
  }

  ctx.restore();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
